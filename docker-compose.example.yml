volumes:
  mysql-data:

services:
  lotgd:
    image: lotgd:dev
    build: .
    restart: unless-stopped
    ports:
      - '8080:80'
    environment:
      DB_HOST: database
      DB_USER: lotgd
      DB_PASS: lotgd
      DB_NAME: lotgd
    depends_on:
      - database

  database:
    image: mysql:8
    restart: unless-stopped
    volumes:
      - mysql-data:/var/lib/mysql
    environment:
      MYSQL_RANDOM_ROOT_PASSWORD: yes
      MYSQL_USER: lotgd
      MYSQL_PASSWORD: lotgd
      MYSQL_DATABASE: lotgd
